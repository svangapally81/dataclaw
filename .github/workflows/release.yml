name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: make install
      - name: Required release gate
        run: |
          test ! -e docs/internal
          test ! -e goal.md
          test ! -e api_tokens.txt
          ! git ls-files | grep -E '(^|/)(\.env|api_tokens\.txt|goal\.md)$|(^|/)docs/internal/'
          make verify
      - name: Build wheel
        run: make wheel
      - name: Smoke install wheel
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          python -m pipx install backend/dist/dataclaw_platform-*.whl
          ~/.local/bin/dataclaw version
      - name: Smoke boot wheel (init + start + /health)
        env:
          DATACLAW_HOME: ${{ runner.temp }}/dc-smoke
        run: |
          ~/.local/bin/dataclaw init
          ~/.local/bin/dataclaw start --host 127.0.0.1 --port 9876 --no-browser &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9876/health >/dev/null; then
              echo "Smoke boot OK — wheel installs, alembic packaged, app starts."
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Smoke boot FAILED — wheel installs but app did not start in 30s."
              cat "$DATACLAW_HOME/dataclaw.log" || true
              exit 1
            fi
            sleep 1
          done
          ~/.local/bin/dataclaw stop || true
      - name: Publish wheel to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist

  build-and-publish-image:
    needs: verify
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Bundle frontend into backend image context
        run: |
          cd frontend
          npm ci
          cd ..
          make bundle-frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ env.VERSION }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          generate_release_notes: true
          body: |
            Docker image: `${{ env.IMAGE_BASE }}:${{ env.VERSION }}`
            Python wheel: `dataclaw`

            See `CHANGELOG.md` for the full release notes.
