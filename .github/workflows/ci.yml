name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: make install
      - name: Public repo hygiene
        run: |
          test ! -e docs/internal
          test ! -e goal.md
          test ! -e api_tokens.txt
          ! git ls-files | grep -E '(^|/)(\.env|api_tokens\.txt|goal\.md)$|(^|/)docs/internal/'
      - name: Required contribution gate
        run: make verify
      - name: Build wheel
        run: make wheel
      - name: Smoke wheel entrypoint
        run: |
          export PIPX_HOME="$RUNNER_TEMP/pipx-home"
          export PIPX_BIN_DIR="$RUNNER_TEMP/pipx-bin"
          mkdir -p "$PIPX_BIN_DIR"
          python -m pip install --user pipx
          python -m pipx install backend/dist/dataclaw_platform-*.whl
          "$PIPX_BIN_DIR/dataclaw" version
